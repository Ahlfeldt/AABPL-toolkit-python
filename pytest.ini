[pytest]
# Restrict collection to the real test suite. aabpl/testing/*.py contains
# internal performance-profiling utilities (test_performance.py, imported
# throughout the library for time_func_perf/func_timer_dict -- a real
# dependency, not a test) and standalone benchmark scripts (test_adaptive_nd.py,
# test_blockk_sweep.py, test_opt1.py, test_opt2a.py) with zero assertions --
# none of these are meant to be pytest-collected, but their test_*.py naming
# would otherwise match default discovery if pytest were run from repo root.
testpaths = tests

# The cache plugin's atomic-write-then-rename never succeeds on this repo's
# network-mapped drive (WinError 87 on every run -- rename across this SMB
# share's semantics fails), leaving an abandoned pytest-cache-files-XXXXXXXX
# temp directory behind on every single test run. Nothing is ever actually
# cached here, so disable the plugin outright rather than accumulate garbage.
addopts = -p no:cacheprovider
